name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all --check
      - name: Check
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace
